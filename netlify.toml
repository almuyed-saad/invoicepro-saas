# ============================================
# NETLIFY CONFIGURATION — InvoicePro
# ============================================

[build]
  publish = "."
  command = "echo 'No build step — static site'"

# ============================================
# REDIRECTS (SPA routing)
# ============================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================
# HEADERS (Security + Performance)
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"