<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — InvoicePro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <a href="/dashboard.html" style="text-decoration: none; color: inherit;">💰 Invoice<span>Pro</span></a>
      </div>
      <div class="navbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      </div>
    </div>
  </nav>

  <!-- ===== 404 CONTENT ===== -->
  <div style="display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 40px 20px;">
    <div style="text-align: center; max-width: 500px;">
      <div style="font-size: 6rem; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 16px;">404</div>
      <h1 style="margin-bottom: 8px;">Page Not Found</h1>
      <p style="color: var(--text-secondary); margin-bottom: 32px;">
        Oops! The page you're looking for doesn't exist or has been moved.
      </p>
      <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
        <a href="/dashboard.html" class="btn btn-primary">Go to Dashboard</a>
        <a href="/index.html" class="btn btn-secondary">Home</a>
      </div>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadTheme);
  </script>
</body>
</html>
