<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — InvoicePro</title>
  <!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F46E5'/><text x='50' y='68' font-family='Arial, sans-serif' font-size='52' font-weight='700' fill='white' text-anchor='middle'>📄</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  
  <!-- Prevent back-forward cache issues -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">💰 Invoice<span>Pro</span></a>
      <div class="navbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        <a href="index.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">← Back to Home</a>
      </div>
    </div>
  </nav>

  <!-- ===== LOGIN FORM ===== -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">💰 Invoice<span>Pro</span></div>
      <p class="subtitle">Log in to your account</p>

      <!-- ===== GOOGLE BUTTON ===== -->
      <button class="btn btn-google" onclick="handleGoogleLogin()" id="googleBtn">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Sign in with Google
      </button>

      <!-- ===== DIVIDER ===== -->
      <div class="auth-divider">or</div>

      <!-- ===== LOGIN FORM ===== -->
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
      <div class="auth-footer" style="margin-top: 8px;">
        <a href="#" style="font-weight: 400; font-size: 0.85rem;">Forgot password?</a>
      </div>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/transitions.js"></script>

  <script>
    // ===== FORCE RELOAD ON BACK-FORWARD CACHE =====
    window.addEventListener('pageshow', function(event) {
      if (event.persisted) {
        window.location.reload();
      }
    });

    // ===== LOAD THEME =====
    document.addEventListener('DOMContentLoaded', function() {
      loadTheme();
    });

    // ===== HANDLE LOGIN =====
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showToast('Please fill in all fields', 'warning');
        return;
      }
      
      const loginBtn = document.getElementById('loginBtn');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      
      const result = await signIn(email, password);
      
      loginBtn.disabled = false;
      loginBtn.textContent = 'Log In';
      
      if (result.success) {
        // Wait for session to be stored
        await new Promise(resolve => setTimeout(resolve, 500));
        
        // Check if session exists
        const { data } = await supabaseClient.auth.getSession();
        if (data?.session) {
          window.location.replace('/dashboard.html');
        } else {
          // Try one more time
          await new Promise(resolve => setTimeout(resolve, 300));
          const { data: retryData } = await supabaseClient.auth.getSession();
          if (retryData?.session) {
            window.location.replace('/dashboard.html');
          } else {
            showToast('Login successful but session not found. Please try again.', 'error');
          }
        }
      }
    });

    // ===== HANDLE GOOGLE LOGIN =====
    async function handleGoogleLogin() {
      const googleBtn = document.getElementById('googleBtn');
      googleBtn.disabled = true;
      googleBtn.textContent = 'Redirecting...';
      
      await signInWithGoogle();
      
      googleBtn.disabled = false;
      googleBtn.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Sign in with Google
      `;
    }

    // ===== MAKE FUNCTIONS GLOBALLY AVAILABLE =====
    window.handleLogin = handleLogin;
    window.handleGoogleLogin = handleGoogleLogin;
  </script>
</body>
</html>
