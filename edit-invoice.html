<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Invoice — InvoicePro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <a href="/dashboard.html" style="text-decoration: none; color: inherit;">💰 Invoice<span>Pro</span></a>
      </div>
      <div class="navbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        <button class="btn btn-secondary" onclick="signOut()" style="padding: 8px 16px; font-size: 0.85rem;">Logout</button>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="container" style="padding-top: 32px; padding-bottom: 60px;">

    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
      <a href="/dashboard.html" style="color: var(--text-secondary); text-decoration: none; font-size: 1.2rem;">←</a>
      <h1 style="margin: 0;">Edit Invoice</h1>
    </div>

    <!-- ===== EDIT INVOICE FORM ===== -->
    <div class="card invoice-form">
      <div id="loadingState" style="text-align: center; padding: 40px; color: var(--text-secondary);">
        ⏳ Loading invoice...
      </div>
      
      <form id="invoiceForm" onsubmit="handleSubmit(event)" style="display: none;">
        <input type="hidden" id="invoiceId" />

        <div class="form-group">
          <label for="clientName">Client Name *</label>
          <input type="text" id="clientName" placeholder="e.g., Acme Corporation" required />
        </div>

        <div class="form-group">
  <label for="clientEmail">Client Email *</label>
  <input type="email" id="clientEmail" placeholder="client@example.com" required />
</div>

        <div class="form-group">
          <label for="project">Project / Service *</label>
          <input type="text" id="project" placeholder="e.g., Website Redesign" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="hours">Hours Worked *</label>
            <input type="number" id="hours" placeholder="e.g., 10" min="0.5" step="0.5" required />
          </div>
          <div class="form-group">
            <label for="rate">Rate per Hour ($) *</label>
            <input type="number" id="rate" placeholder="e.g., 75" min="0" step="0.01" required />
          </div>
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="draft">Draft</option>
            <option value="sent">Sent</option>
            <option value="paid">Paid</option>
          </select>
        </div>

        <div class="form-group">
          <label>Total Amount</label>
          <div class="total-display" id="totalDisplay">$0.00</div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;">
          <button type="submit" class="btn btn-primary" id="submitBtn">Update Invoice</button>
          <a href="/dashboard.html" class="btn btn-secondary">Cancel</a>
        </div>

      </form>
    </div>

  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/invoices.js"></script>
  <script src="js/edit-invoice.js"></script>
  <script src="js/transitions.js"></script>

  <script>
    // ===== LOAD THEME AND CHECK AUTH =====
    document.addEventListener('DOMContentLoaded', async function() {
      loadTheme();
      updateThemeIcon();
      
      const user = await getCurrentUser();
      if (!user) {
        window.location.href = '/login.html';
        return;
      }
      
      // Load invoice data
      await loadInvoiceForEdit();
    });
  </script>
</body>
</html>
