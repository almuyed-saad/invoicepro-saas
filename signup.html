<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — InvoicePro</title>
  <!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F46E5'/><text x='50' y='68' font-family='Arial, sans-serif' font-size='52' font-weight='700' fill='white' text-anchor='middle'>📄</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">💰 Invoice<span>Pro</span></a>
      <div class="navbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        <a href="index.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">← Back to Home</a>
      </div>
    </div>
  </nav>

  <!-- ===== SIGNUP FORM ===== -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">💰 Invoice<span>Pro</span></div>
      <p class="subtitle">Create your free account</p>

      <!-- ===== GOOGLE BUTTON ===== -->
      <button class="btn btn-google" onclick="handleGoogleSignup()" id="googleBtn">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Sign up with Google
      </button>

      <!-- ===== DIVIDER ===== -->
      <div class="auth-divider">or</div>

      <!-- ===== SIGNUP FORM ===== -->
      <form id="signupForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" />
          <div class="hint">Must be at least 6 characters.</div>
        </div>

        <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/transitions.js"></script>

  <script>
    // ===== FORCE RELOAD ON BACK-FORWARD CACHE =====
    window.addEventListener('pageshow', function(event) {
      if (event.persisted) {
        window.location.reload();
      }
    });

    // ===== LOAD THEME =====
    document.addEventListener('DOMContentLoaded', function() {
      loadTheme();
    });

    // ===== HANDLE SIGNUP =====
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showToast('Please fill in all fields', 'warning');
        return;
      }
      
      if (!isValidEmail(email)) {
        showToast('Please enter a valid email address', 'error');
        return;
      }
      
      if (!isValidPassword(password)) {
        showToast('Password must be at least 6 characters', 'error');
        return;
      }
      
      const signupBtn = document.getElementById('signupBtn');
      signupBtn.disabled = true;
      signupBtn.textContent = 'Creating account...';
      
      const result = await signUp(email, password);
      
      signupBtn.disabled = false;
      signupBtn.textContent = 'Create Account';
      
      if (result.success) {
        showToast('Account created! Please check your email to confirm.', 'success');
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);
      }
    });

    // ===== HANDLE GOOGLE SIGNUP =====
    async function handleGoogleSignup() {
      const googleBtn = document.getElementById('googleBtn');
      googleBtn.disabled = true;
      googleBtn.textContent = 'Redirecting...';
      
      await signInWithGoogle();
      
      googleBtn.disabled = false;
      googleBtn.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Sign up with Google
      `;
    }

    // ===== MAKE FUNCTIONS GLOBALLY AVAILABLE =====
    window.handleGoogleSignup = handleGoogleSignup;
  </script>
</body>
</html>
